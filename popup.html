<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <section class="section">
      <h2 class="section-head">Create new workspace</h2>
      <div class="name-row">
        <span id="nameIconSlot"></span>
        <input id="name" type="text" placeholder="Workspace name" maxlength="40" />
      </div>
      <div class="add-actions">
        <button id="save" class="primary" disabled title="Save the current tabs as a new workspace">
          <svg class="btn-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
            <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/>
            <path d="M7 3v4a1 1 0 0 0 1 1h7"/>
          </svg>
          Save current tabs
        </button>
        <button id="empty" class="primary" disabled title="Open a fresh, empty workspace">
          <svg class="btn-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 10v6"/><path d="M9 13h6"/>
            <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>
          </svg>
          Start empty
        </button>
      </div>
    </section>

    <section id="moveStrip" class="section move-strip" hidden>
      <h2 class="section-head">Current tab</h2>
      <div class="move-row">
        <img id="moveFav" class="move-fav" alt="" hidden />
        <span id="moveIcon" class="move-icon">&#8618;</span>
        <span id="moveLabel" class="move-label"></span>
        <select id="movePick" class="move-pick">
          <option value="" disabled selected>Move to&hellip;</option>
        </select>
      </div>
      <span id="moveNew" class="move-new" hidden>
        <span id="moveNewIconSlot"></span>
        <input id="moveNewName" type="text" placeholder="New workspace name" maxlength="40" />
        <button id="moveNewGo" class="primary" disabled>Move</button>
      </span>
    </section>

    <section class="section">
      <h2 class="section-head">Workspaces</h2>
      <ul id="list" class="list"></ul>
    </section>

    <div id="iconPicker" class="icon-picker" hidden>
      <div class="icon-picker-scrim"></div>
      <div class="icon-picker-panel" role="dialog" aria-label="Choose an icon">
        <div class="icon-picker-head">
          <input id="iconSearch" type="text" placeholder="Search icons…" autocomplete="off" />
          <button id="iconPickerClose" class="icon-picker-close" title="Close" aria-label="Close">✕</button>
        </div>
        <div id="iconPickerBody" class="icon-picker-body"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
